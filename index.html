<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistencia Diaria</title>

  <style>

    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .persona{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      border-bottom:1px solid #ddd;
    }

    .btn{
      background:#16a34a;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn:hover{
      background:#15803d;
    }

    .estado{
      margin-left:10px;
      color:#2563eb;
      font-size:14px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>ASISTENCIA DIARIA</h1>

  <div id="lista"></div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyps-lmk3cJzOQiozu6hSybcJQSyPuf6JS1jpho47XagZ5bH5fHzSqA01vU3LLiK_ztXw/exec";

const personas = [
  "CARLOS",
  "RUBEN",
  "MARIO",
  "ITALO",
  "FREDDY"
];

const lista = document.getElementById("lista");

personas.forEach(nombre => {

  const div = document.createElement("div");

  div.className = "persona";

  div.innerHTML = `
    <div>
      <strong>${nombre}</strong>
      <span class="estado" id="estado-${nombre}"></span>
    </div>

    <button class="btn" onclick="registrar('${nombre}')">
      Registrar
    </button>
  `;

  lista.appendChild(div);

});

async function registrar(nombre){

  const estado = document.getElementById(`estado-${nombre}`);

  estado.innerHTML = "Guardando...";

  const datos = {
    nombre: nombre,
    fecha: new Date().toLocaleDateString(),
    hora: new Date().toLocaleTimeString()
  };

  try{

    const response = await fetch(WEB_APP_URL, {

      method: "POST",

      mode: "cors",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify(datos)

    });

    const result = await response.text();

    console.log(result);

    estado.innerHTML = "✅ Registrado";

  }catch(error){

    console.error(error);

    estado.innerHTML = "❌ Error";

  }

}

</script>

</body>
</html>
