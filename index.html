<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ASISTENCIA DIARIA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f3f4f6;
      padding:30px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      border-radius:12px;
      padding:30px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#111827;
    }

    .persona{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 10px;
      border-bottom:1px solid #e5e7eb;
    }

    .nombre{
      font-size:20px;
      font-weight:bold;
      color:#111827;
    }

    .btn{
      background:#16a34a;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#15803d;
    }

    .estado{
      margin-left:15px;
      font-size:14px;
      color:#2563eb;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      color:#6b7280;
      font-size:13px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>ASISTENCIA DIARIA</h1>

  <div id="lista"></div>

  <div class="footer">
    Sistema conectado con Google Sheets
  </div>

</div>

<script>

// ============================================
// URL WEB APP APPS SCRIPT
// ============================================

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyps-lmk3cJzOQiozu6hSybcJQSyPuf6JS1jpho47XagZ5bH5fHzSqA01vU3LLiK_ztXw/exec";

// ============================================
// PERSONAS
// ============================================

const personas = [
  "CARLOS",
  "RUBEN",
  "MARIO",
  "ITALO",
  "FREDDY"
];

// ============================================
// CREAR LISTA
// ============================================

const lista = document.getElementById("lista");

personas.forEach(nombre => {

  const div = document.createElement("div");

  div.className = "persona";

  div.innerHTML = `
  
    <div>
      <span class="nombre">${nombre}</span>
      <span class="estado" id="estado-${nombre}"></span>
    </div>

    <button class="btn" onclick="registrar('${nombre}')">
      Registrar
    </button>

  `;

  lista.appendChild(div);

});

// ============================================
// REGISTRAR ASISTENCIA
// ============================================

async function registrar(nombre){

  const estado = document.getElementById(`estado-${nombre}`);

  estado.innerHTML = "⏳ Guardando...";

  const datos = {

    nombre: nombre,

    fecha: new Date().toLocaleDateString('es-EC'),

    hora: new Date().toLocaleTimeString('es-EC')

  };

  try{

    const response = await fetch(WEB_APP_URL, {

      method: "POST",

      mode: "cors",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify(datos)

    });

    const result = await response.text();

    console.log(result);

    if(result.includes("OK")){

      estado.innerHTML = "✅ Registrado";

    }else{

      estado.innerHTML = "❌ Error";

      alert(result);

    }

  }catch(error){

    console.error(error);

    estado.innerHTML = "❌ Error";

    alert(error);

  }

}

</script>

</body>
</html>
